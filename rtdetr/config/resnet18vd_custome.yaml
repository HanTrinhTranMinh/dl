model: RTDETR

backbone:
  name: presnet
  depth: 18
  variant: d
  in_channels: 3
  return_idx: [1, 2, 3]

neck:
  name: hybrid_encoder
  in_channels: [128, 256, 512]
  hidden_dim: 256
  num_encoder_layers: 1
  num_heads: 8
  ffn_dim: 1024
  csp_blocks: 2

head:
  hidden_dim: 256
  num_queries: 300
  num_classes: 4
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 0.4

decoder:
  hidden_dim: 256
  num_layers: 6
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.0